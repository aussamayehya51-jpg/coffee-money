<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#5a3a22" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Coffee Money" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Coffee Money</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  :root{ --brown:#5a3a22; --brown2:#7a4f30; --cream:#f7f1e8; --gold:#c8923a; --green:#1f9d57; --red:#d23b3b; --orange:#c0703a; --ink:#2c2419; --muted:#8a7a66; --line:#e4d9c8; }
  body{ font-family:"Segoe UI",Tahoma,system-ui,Arial,sans-serif; background:var(--cream); color:var(--ink); }
  .wrap{ max-width:820px; margin:0 auto; padding:14px; }
  .top{ background:var(--brown); color:#fff; border-radius:16px; padding:16px 20px; text-align:center; margin-bottom:12px; }
  .top h1{ font-size:22px; } .top .s{ opacity:.85; font-size:13px; margin-top:3px; }
  .cur{ margin-top:11px; }
  .cur button{ background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:20px; padding:7px 16px; font-size:14px; font-weight:700; cursor:pointer; margin:0 3px; }
  .cur button.on{ background:#fff; color:var(--brown); }
  .curlabel{ text-align:center; font-size:13px; color:var(--muted); margin:0 0 12px; font-weight:700; }
  .monthbar{ display:flex; align-items:center; justify-content:center; gap:14px; margin:0 0 12px; }
  .monthbar button{ background:var(--brown); color:#fff; border:none; border-radius:50%; width:38px; height:38px; font-size:15px; cursor:pointer; }
  .mlabel{ font-weight:800; color:var(--brown); font-size:16px; min-width:150px; text-align:center; }

  .kids{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .kid{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px; }
  .kid h2{ font-size:17px; color:var(--brown); margin-bottom:10px; }
  .kid .nums{ display:flex; gap:8px; margin-bottom:10px; }
  .kid .nb{ flex:1; text-align:center; background:var(--cream); border-radius:9px; padding:8px 4px; }
  .kid .nb .l{ font-size:11px; color:var(--muted); } .kid .nb .v{ font-size:15px; font-weight:800; margin-top:2px; }
  .leftover{ text-align:center; padding:9px; border-radius:9px; font-weight:800; margin-bottom:10px; font-size:15px; }
  .leftover.good{ background:#e3f6ec; color:var(--green); } .leftover.zero{ background:#eee; color:var(--muted); } .leftover.bad{ background:#fdeaea; color:var(--red); }
  .kidbtns{ display:flex; gap:8px; }
  .kidbtns button{ flex:1; border:none; border-radius:9px; padding:12px 4px; font-size:14px; font-weight:700; color:#fff; cursor:pointer; }
  .kb-in{ background:var(--green); } .kb-out{ background:var(--orange); }

  .shop{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:14px; }
  .shop h2{ font-size:16px; color:var(--brown); margin-bottom:10px; }
  .shop .nums{ display:flex; gap:8px; }
  .shop .nb{ flex:1; text-align:center; background:var(--cream); border-radius:9px; padding:10px 4px; }
  .shop .nb .l{ font-size:11px; color:var(--muted); } .shop .nb .v{ font-size:16px; font-weight:800; margin-top:2px; }
  .shopbtns{ display:flex; gap:8px; margin-top:10px; }
  .shopbtns button{ flex:1; border:none; border-radius:10px; padding:13px 4px; font-size:14px; font-weight:700; color:#fff; cursor:pointer; }
  .sb-sale{ background:var(--brown2); } .sb-buy{ background:var(--orange); }

  .hist h2{ font-size:15px; color:var(--brown); margin-bottom:8px; }
  .hitem{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 13px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; font-size:14px; gap:8px; }
  .hitem .del{ color:var(--red); cursor:pointer; font-size:18px; opacity:.5; padding:0 6px; } .hitem .del:hover{ opacity:1; }
  .empty{ text-align:center; color:var(--muted); padding:18px; }
  .htext{ flex:1; } .hdate{ font-size:11px; color:var(--muted); margin-top:3px; font-weight:600; }
  .shopbook{ margin-bottom:12px; } .shopbook:last-of-type{ margin-bottom:0; }
  .bookname{ font-size:13px; font-weight:800; color:var(--brown); margin:2px 0 6px; }
  .credit{ text-align:center; color:var(--muted); font-size:13px; line-height:1.7; margin:20px 4px 26px; padding-top:16px; border-top:1px solid var(--line); }
  .credit .big{ color:var(--brown); font-weight:800; font-size:14px; margin-bottom:2px; }

  .pos{ color:var(--green); } .neg{ color:var(--red); }
  .storewarn{ background:#fdecec; border:1px solid #f3b4b4; color:#a02020; border-radius:12px; padding:12px 14px; font-size:14px; margin-bottom:12px; line-height:1.5; }
  .bg{ position:fixed; inset:0; background:rgba(44,36,25,.55); display:none; align-items:center; justify-content:center; padding:14px; z-index:10; }
  .bg.show{ display:flex; }
  .modal{ background:#fff; border-radius:18px; padding:20px; width:100%; max-width:420px; }
  .modal h3{ font-size:18px; margin-bottom:14px; color:var(--brown); }
  .help{ background:#fdf6e9; border:1px solid #f0e2c4; border-radius:10px; padding:10px 12px; font-size:13px; color:#7a5a20; margin-bottom:14px; }
  .field{ margin-bottom:13px; }
  .field label{ display:block; font-size:14px; color:var(--muted); margin-bottom:6px; }
  .field input{ width:100%; padding:13px; font-size:17px; border:1px solid var(--line); border-radius:10px; }
  .go{ width:100%; padding:15px; font-size:17px; font-weight:800; color:#fff; background:var(--brown); border:none; border-radius:12px; cursor:pointer; }
  .cancel{ width:100%; padding:11px; font-size:14px; color:var(--muted); background:none; border:none; cursor:pointer; margin-top:6px; }
  @media(max-width:560px){ .kids{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>☕ Coffee Money</h1>
    <div class="s">Everyone's cash + the shop — Dollars and Lira kept separate.</div>
    <div class="cur">
      <button id="cur-lbp" class="on" onclick="setCur('LBP')">LBP ل.ل</button>
      <button id="cur-usd" onclick="setCur('USD')">USD $</button>
    </div>
  </div>

  <div class="curlabel" id="curlabel"></div>

  <div class="monthbar">
    <button onclick="changeMonth(-1)" title="Previous month">◀</button>
    <div id="mLabel" class="mlabel"></div>
    <button onclick="changeMonth(1)" title="Next month">▶</button>
  </div>

  <div class="kids" id="kids"></div>

  <div class="shop">
    <h2>☕ The shop</h2>
    <div id="shop-books"></div>
    <div class="shopbtns">
      <button class="sb-sale" onclick="openSale()">🧁 Sales / In</button>
      <button class="sb-buy" onclick="openBuy()">🛒 Buy / Out</button>
    </div>
  </div>

  <div class="hist">
    <h2>📒 Everything that happened</h2>
    <div id="hist"></div>
  </div>

  <div class="credit">
    <div class="big">☕ Made with love — Oussama &amp; his AI friend Claude 🤖</div>
    Built together, just for you and your shop. Enjoy it, brother. ❤️
  </div>
</div>

<div class="bg" id="bg"><div class="modal" id="modal"></div></div>

<script>
/* ===== Coffee Money — single file ===== */
const PEOPLE = ['x','y','z','s'];
const PERSON_LABEL = { x:'Rashad', y:'Omar', z:'Rabih', s:'Shop cash' };
function emptyState(){ return { entries:[], seq:1 }; }
function addEntry(s,e){ e.id=s.seq++; e.at=new Date().toISOString(); s.entries.push(e); return e; }
function cashIn(s,o){ return addEntry(s,{ type:'in', person:o.person, currency:o.currency, amount:num(o.amount), note:o.note }); }
function cashOut(s,o){ return addEntry(s,{ type:'out', person:o.person, currency:o.currency, amount:num(o.amount), note:o.note }); }
function sale(s,o){ return addEntry(s,{ type:'sale', currency:o.currency, amount:num(o.amount), note:o.note }); }
function buy(s,o){ return addEntry(s,{ type:'buy', currency:o.currency, amount:num(o.amount), note:o.note }); }
function deleteEntry(s,id){ s.entries = s.entries.filter(function(e){ return e.id!==id; }); }
function kidSummary(s,person,cur,month){
  var cin=0,cout=0;
  s.entries.forEach(function(e){ if(e.person!==person||e.currency!==cur||!inMonth(e.at,month)) return; if(e.type==='in') cin+=e.amount; if(e.type==='out') cout+=e.amount; });
  return { person:person, label:PERSON_LABEL[person], cash_in:round(cin), cash_out:round(cout), balance:round(cin-cout) };
}
function shopSummary(s,cur,month){
  var sales=0,buys=0;
  s.entries.forEach(function(e){ if(e.currency!==cur||!inMonth(e.at,month)) return; if(e.type==='sale') sales+=e.amount; if(e.type==='buy') buys+=e.amount; });
  return { sales:round(sales), buy:round(buys), profit:round(sales-buys) };
}
function history(s,cur,month,limit){ limit=limit||200; return s.entries.filter(function(e){ return e.currency===cur && inMonth(e.at,month); }).slice().reverse().slice(0,limit).map(function(e){ return { id:e.id, at:e.at, text:describe(e) }; }); }
function describe(e){ var L=PERSON_LABEL;
  if(e.type==='in') return L[e.person]+' — Cash in '+money(e.amount,e.currency)+(e.note?' · '+e.note:'');
  if(e.type==='out') return L[e.person]+' — Cash out '+money(e.amount,e.currency)+(e.note?' · '+e.note:'');
  if(e.type==='sale') return 'Sales / In '+money(e.amount,e.currency)+(e.note?' · '+e.note:'');
  if(e.type==='buy') return 'Buy / Out '+money(e.amount,e.currency)+(e.note?' · '+e.note:'');
  return 'entry';
}
function num(n){ return Math.round((Number(n)||0)*100)/100; }
function round(n){ return Math.round((Number(n)||0)*100)/100; }
function money(n,cur){ n=Number(n)||0; return cur==='USD' ? '$'+n.toLocaleString('en-US') : n.toLocaleString('en-US')+' ل.ل'; }
/* ===== end logic ===== */

let state, CUR='LBP', STORAGE_OK=true, STORAGE_ERR='', selMonth=new Date().toISOString().slice(0,7);
function migrate(s){
  s.entries.forEach(function(e){
    if(!e.currency) e.currency='LBP';
    if(e.item && !e.note) e.note=e.item;
    if(e.product && !e.note) e.note=e.product;
    if(e.type==='item') e.type='out';
    if(e.type==='repay') e.type='out';
    if(e.type==='expense') e.type='buy';
  });
}
function load(){
  try{ state=JSON.parse(localStorage.getItem('coffeeMoney2')); }catch(e){}
  if(!state||!state.entries) state=emptyState();
  if(typeof state.seq!=='number'){ state.seq=1; state.entries.forEach(function(e){ if(e.id>=state.seq) state.seq=e.id+1; }); }
  migrate(state);
  try{ CUR=localStorage.getItem('coffeeCur2')||'LBP'; }catch(e){ CUR='LBP'; }
}
function save(){
  try{ localStorage.setItem('coffeeMoney2', JSON.stringify(state)); STORAGE_OK=true; }
  catch(e){ STORAGE_OK=false; STORAGE_ERR=((e&&e.name)||'Error')+': '+((e&&e.message)||String(e)); showStorageWarning(); }
}
function storageWorks(){
  try{ localStorage.setItem('__cm_test','1'); var ok=localStorage.getItem('__cm_test')==='1'; localStorage.removeItem('__cm_test'); return ok; }
  catch(e){ STORAGE_ERR=((e&&e.name)||'Error')+': '+((e&&e.message)||String(e)); return false; }
}
function showStorageWarning(){
  if(document.getElementById('storeWarn')) return;
  var d=document.createElement('div'); d.id='storeWarn'; d.className='storewarn';
  var mode=(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)?'home-icon':'browser-tab';
  d.innerHTML='⚠️ This window can’t save your numbers. Please open the app in <b>Chrome</b> or <b>Safari</b> (not inside WhatsApp), then add it to your home screen — your numbers will save there.'
    +'<div style="margin-top:8px;font-size:11px;color:#7a3030;border-top:1px solid #f3b4b4;padding-top:6px">For support → reason: <b>'
    +(STORAGE_ERR||'storage blocked')+'</b> · cookies: <b>'+(navigator.cookieEnabled?'ON':'OFF')+'</b> · opened as: <b>'+mode+'</b></div>';
  var wrap=document.querySelector('.wrap'); wrap.insertBefore(d, wrap.firstChild);
}
function setCur(c){ CUR=c; try{ localStorage.setItem('coffeeCur2',c); }catch(e){} document.getElementById('cur-lbp').className=c==='LBP'?'on':''; document.getElementById('cur-usd').className=c==='USD'?'on':''; render(); }
function fmt(n){ return money(n,CUR); }
function curWord(){ return CUR==='USD'?'Dollars $':'Lira ل.ل'; }
function fmtDate(at){ var d=new Date(at); if(isNaN(d.getTime())) return ''; var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; var h=d.getHours(),mi=d.getMinutes(),ap=h>=12?'PM':'AM',h12=h%12||12,mm=(mi<10?'0':'')+mi; return d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear()+' · '+h12+':'+mm+' '+ap; }
function inMonth(at,ym){ return String(at||'').slice(0,7)===ym; }
function monthLabel(ym){ var M=['January','February','March','April','May','June','July','August','September','October','November','December']; var p=String(ym).split('-'); return (M[parseInt(p[1],10)-1]||'')+' '+p[0]; }
function changeMonth(d){ var p=selMonth.split('-').map(Number),y=p[0],m=p[1]+d; if(m<1){m=12;y--;} if(m>12){m=1;y++;} selMonth=y+'-'+String(m).padStart(2,'0'); render(); }
function openPersonHistory(p){
  var L=PERSON_LABEL[p];
  var items=state.entries.filter(function(e){ return e.person===p && e.currency===CUR && inMonth(e.at,selMonth); }).slice().reverse();
  var rows=items.length ? items.map(function(e){ return '<div class="hitem"><span class="htext">'+describe(e)+'<div class="hdate">'+fmtDate(e.at)+'</div></span><span class="del" onclick="removeEntry('+e.id+')">×</span></div>'; }).join('') : '<div class="empty">No entries for '+L+' in '+monthLabel(selMonth)+'.</div>';
  modal.innerHTML='<h3>📒 '+L+' — '+monthLabel(selMonth)+'</h3>'+rows+'<button class="cancel" onclick="closeBox()">Close</button>';
  bg.classList.add('show');
}
function shopBlock(cur){ var sh=shopSummary(state,cur,selMonth); var label=cur==='USD'?'Dollars ($)':'Lira (ل.ل)'; return '<div class="shopbook"><div class="bookname">'+label+'</div><div class="nums">'+'<div class="nb"><div class="l">Sales / In</div><div class="v pos">'+money(sh.sales,cur)+'</div></div>'+'<div class="nb"><div class="l">Buy / Out</div><div class="v neg">'+money(sh.buy,cur)+'</div></div>'+'<div class="nb"><div class="l">Profit</div><div class="v '+(sh.profit>=0?'pos':'neg')+'">'+money(sh.profit,cur)+'</div></div>'+'</div></div>'; }

function render(){
  var cur=CUR;
  document.getElementById('mLabel').textContent = monthLabel(selMonth);
  document.getElementById('curlabel').textContent = cur==='USD' ? '💵 You are in the Dollars book ($)' : '💵 You are in the Lira book (ل.ل)';
  document.getElementById('kids').innerHTML = PEOPLE.map(function(p){
    var k=kidSummary(state,p,cur,selMonth);
    var cls = k.balance>0?'good':(k.balance<0?'bad':'zero');
    return '<div class="kid"><h2 onclick="openPersonHistory(\''+p+'\')" style="cursor:pointer">'+k.label+' 📒</h2>'
      +'<div class="nums">'
      +'<div class="nb"><div class="l">Cash in</div><div class="v">'+fmt(k.cash_in)+'</div></div>'
      +'<div class="nb"><div class="l">Cash out</div><div class="v">'+fmt(k.cash_out)+'</div></div>'
      +'</div>'
      +'<div class="leftover '+cls+'">Balance: '+fmt(k.balance)+'</div>'
      +'<div class="kidbtns">'
      +'<button class="kb-in" onclick="openIn(\''+p+'\')">＋ Cash in</button>'
      +'<button class="kb-out" onclick="openOut(\''+p+'\')">－ Cash out</button>'
      +'</div></div>';
  }).join('');
  document.getElementById('shop-books').innerHTML = shopBlock('LBP') + shopBlock('USD');
  var h=history(state,cur,selMonth,200);
  document.getElementById('hist').innerHTML = h.length ? h.map(function(e){ return '<div class="hitem"><span class="htext">'+e.text+'<div class="hdate">'+fmtDate(e.at)+'</div></span><span class="del" onclick="removeEntry('+e.id+')">×</span></div>'; }).join('') : '<div class="empty">Nothing yet in this book. Use the buttons above to start.</div>';
}
function removeEntry(id){ if(confirm('Delete this entry?')){ deleteEntry(state,id); save(); render(); } }

const bg=document.getElementById('bg'), modal=document.getElementById('modal');
function closeBox(){ bg.classList.remove('show'); }
bg.onclick=function(e){ if(e.target===bg) closeBox(); };
function val(id){ var el=document.getElementById(id); return el?el.value:''; }

function openIn(p){
  modal.innerHTML='<h3>＋ Cash in — '+PERSON_LABEL[p]+'</h3>'
    +'<div class="help">Money <b>'+PERSON_LABEL[p]+'</b> gave you. In <b>'+curWord()+'</b>.</div>'
    +'<div class="field"><label>How much?</label><input id="f-amt" type="number" inputmode="decimal" placeholder="0" autofocus></div>'
    +'<div class="field"><label>Note (optional)</label><input id="f-note" placeholder="e.g. from his salary"></div>'
    +'<button class="go" onclick="doIn(\''+p+'\')">Save</button><button class="cancel" onclick="closeBox()">Cancel</button>';
  bg.classList.add('show');
}
function doIn(p){ cashIn(state,{ person:p, currency:CUR, amount:val('f-amt'), note:val('f-note') }); save(); closeBox(); render(); }

function openOut(p){
  modal.innerHTML='<h3>－ Cash out — '+PERSON_LABEL[p]+'</h3>'
    +'<div class="help">Money that went back out for <b>'+PERSON_LABEL[p]+'</b> — given back to him or taken. In <b>'+curWord()+'</b>.</div>'
    +'<div class="field"><label>How much?</label><input id="f-amt" type="number" inputmode="decimal" placeholder="0" autofocus></div>'
    +'<div class="field"><label>Note (optional)</label><input id="f-note" placeholder="e.g. gave back to him"></div>'
    +'<button class="go" onclick="doOut(\''+p+'\')">Save</button><button class="cancel" onclick="closeBox()">Cancel</button>';
  bg.classList.add('show');
}
function doOut(p){ cashOut(state,{ person:p, currency:CUR, amount:val('f-amt'), note:val('f-note') }); save(); closeBox(); render(); }

function openSale(){
  modal.innerHTML='<h3>🧁 Sales / In</h3>'
    +'<div class="help">Money the shop made by selling. In <b>'+curWord()+'</b>.</div>'
    +'<div class="field"><label>How much?</label><input id="f-amt" type="number" inputmode="decimal" placeholder="0" autofocus></div>'
    +'<div class="field"><label>What did you sell? (optional)</label><input id="f-note" placeholder="e.g. coffee, cold drinks"></div>'
    +'<button class="go" onclick="doSale()">Save</button><button class="cancel" onclick="closeBox()">Cancel</button>';
  bg.classList.add('show');
}
function doSale(){ sale(state,{ currency:CUR, amount:val('f-amt'), note:val('f-note') }); save(); closeBox(); render(); }

function openBuy(){
  modal.innerHTML='<h3>🛒 Buy / Out</h3>'
    +'<div class="help">Money you spent buying things for the shop. In <b>'+curWord()+'</b>.</div>'
    +'<div class="field"><label>How much?</label><input id="f-amt" type="number" inputmode="decimal" placeholder="0" autofocus></div>'
    +'<div class="field"><label>What did you buy? (optional)</label><input id="f-note" placeholder="e.g. coffee beans, cups"></div>'
    +'<button class="go" onclick="doBuy()">Save</button><button class="cancel" onclick="closeBox()">Cancel</button>';
  bg.classList.add('show');
}
function doBuy(){ buy(state,{ currency:CUR, amount:val('f-amt'), note:val('f-note') }); save(); closeBox(); render(); }

load(); render(); if(!storageWorks()) showStorageWarning();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
</body>
</html>
